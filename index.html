<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMAGOTCHI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="device">
        <div class="chain-hole"></div>

        <div class="screen-frame">
            <div class="screen" id="screen">
                <div class="hud-top">
                    <span class="px" id="age-display">EGG</span>
                    <span class="px" id="time-display">00:00</span>
                </div>
                <canvas id="pet-canvas" width="128" height="72"></canvas>
                <div class="stat-grid">
                    <div class="srow"><span class="px sname">FOOD</span><div class="bbar" id="bar-hunger"></div></div>
                    <div class="srow"><span class="px sname">HAPPY</span><div class="bbar" id="bar-happiness"></div></div>
                    <div class="srow"><span class="px sname">HLTH</span><div class="bbar" id="bar-health"></div></div>
                    <div class="srow"><span class="px sname">ENRG</span><div class="bbar" id="bar-energy"></div></div>
                </div>
            </div>
        </div>

        <div class="side-dot left-dot"></div>
        <div class="side-dot right-dot"></div>

        <div class="controls">
            <div class="btn-col">
                <span class="px btn-tag">A</span>
                <button class="bigbtn btn-a" onclick="feed()">🍎</button>
                <span class="px btn-sub">FEED</span>
            </div>

            <div class="mid-col">
                <div class="px brand-text">TAMA</div>
                <div class="speaker">
                    <div class="sdot"></div><div class="sdot"></div>
                    <div class="sdot"></div><div class="sdot"></div>
                    <div class="sdot"></div><div class="sdot"></div>
                </div>
                <div class="small-btns">
                    <button class="smalbtn" onclick="toggleSleep()"><span class="px">ZZZ</span></button>
                    <button class="smalbtn" onclick="heal()"><span class="px">MED</span></button>
                </div>
            </div>

            <div class="btn-col">
                <span class="px btn-tag">B</span>
                <button class="bigbtn btn-b" onclick="play()">🎮</button>
                <span class="px btn-sub">PLAY</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
